version: '3.8'

services:
  # 1. Hamara Custom Node.js App Layer
  web-app:
    build: ./node-custom-app
    container_name: shubh-compose-node-app
    ports:
      - "6060:3000"
    networks:
      - shubh-network

  # 2. Database Layer with Storage Persistence
  database:
    image: mysql:8.0
    container_name: shubh-compose-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysecurepassword
    volumes:
      - shubh-compose-db-data:/var/lib/mysql
    networks:
      - shubh-network

volumes:
  shubh-compose-db-data:

networks:
  shubh-network:
    driver: bridge
